name = "silver-stream-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Cloudflare D1 (قاعدة البيانات) ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "silver-stream-db"
database_id = "0ffc8340-f67f-426f-a187-21ed4522934f"

# ─── متغيرات عادية ────────────────────────────────────────────────────────────
[vars]
FORGE_BASE_URL = "https://baas-platform.mcfoxy.workers.dev"

# ─── أسرار — تُضاف عبر: wrangler secret put SECRET_NAME ──────────────────────
# FORGE_API_KEY         = "..."   (مفتاح مشروع FORGE)
# CLERK_SECRET_KEY      = "sk_..."
# CLERK_PUBLISHABLE_KEY = "pk_..."

# أضف [[routes]] فقط عند ربط domain مخصص لاحقاً
