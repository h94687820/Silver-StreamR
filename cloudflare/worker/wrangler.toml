name = "silver-stream-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Cloudflare D1 (قاعدة البيانات) ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "silver-stream-db"
database_id = "0ffc8340-f67f-426f-a187-21ed4522934f"

# ─── متغيرات عادية ────────────────────────────────────────────────────────────
[vars]
FORGE_BASE_URL = "https://baas-server-model-a.mcfoxy.workers.dev"
# Clerk FAPI — derived from VITE_CLERK_PUBLISHABLE_KEY (pk_test_dml0YWwtZm94...  → vital-fox-43)
CLERK_FAPI = "https://new-squirrel-59.clerk.accounts.dev"

# ─── Service Binding — اتصال مباشر بـ FORGE Worker (يتجنّب قيود HTTP بين Workers) ─
[[services]]
binding = "FORGE_SERVICE"
service = "baas-server-model-a"

# ─── أسرار — تُضاف عبر: wrangler secret put SECRET_NAME ──────────────────────
# FORGE_API_KEY         = "..."   (مفتاح مشروع FORGE)
# CLERK_SECRET_KEY      = "sk_..."
# CLERK_PUBLISHABLE_KEY = (same as VITE_CLERK_PUBLISHABLE_KEY in Replit secrets — working-serval-40)

# أضف [[routes]] فقط عند ربط domain مخصص لاحقاً
