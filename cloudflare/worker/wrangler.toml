name = "silver-stream-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Cloudflare D1 (قاعدة البيانات) ───────────────────────────────────────────
# بعد إنشاء الـ database عبر: wrangler d1 create silver-stream-db
# انسخ الـ database_id هنا
[[d1_databases]]
binding = "DB"
database_name = "silver-stream-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# ─── Cloudflare R2 (تخزين الملفات) ────────────────────────────────────────────
# بعد إنشاء الـ bucket عبر: wrangler r2 bucket create silver-stream-storage
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "silver-stream-storage"

# ─── متغيرات عادية (غير سرية) ─────────────────────────────────────────────────
[vars]
# رابط R2 العام — عدّله بعد تفعيل Custom Domain أو Public Access على الـ bucket
STORAGE_PUBLIC_URL = "https://pub-REPLACE.r2.dev"

# ─── أسرار — تُضاف عبر: wrangler secret put SECRET_NAME ──────────────────────
# CLERK_SECRET_KEY        = "sk_..."
# CLERK_PUBLISHABLE_KEY   = "pk_..."

[[routes]]
pattern = "/api/*"
zone_name = ""
